<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PathMaid</title>
    <style>
      @keyframes msg-fade-in { from { opacity: 0; } to { opacity: 1; } }
      html { margin: 0; height: 100%; }
      body { margin: 0; height: 100%; overflow: hidden; }
      #root { height: 100%; display: flex; flex-direction: column; }
      #static-splash {
        position: fixed; inset: 0; z-index: 40;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 24px;
        background: #000;
        font-family: system-ui, sans-serif;
      }
      #static-splash-logo {
        height: 56px; width: auto; object-fit: contain;
      }
      #static-splash-msg {
        font-size: 14px; color: rgba(200, 170, 120, 0.75);
        text-align: center; max-width: 300px; line-height: 1.5;
        animation: msg-fade-in 0.4s ease;
      }
      #splash-mascot {
        height: 380px; width: auto; object-fit: contain;
      }
    </style>
  </head>
  <body style="background: #000">
    <div id="static-splash">
      <img id="static-splash-logo" src="/mascot/logo.png" alt="PathMaid" />
      <img id="splash-mascot" alt="" />
      <div id="static-splash-msg"></div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var msgs = [
          "Never split the party. NEVER SPLIT THE PARTY.",
          "When the DM asks 'Are you sure?', you should always say 'No.'",
          "Be cautious and intelligent. This does not have save files.",
          "Just because you CAN do it, doesn't mean you should — but it does mean you probably will.",
          "The dice don't hate you. They're just indifferent.",
          "Every failed roll is just an opportunity for creative problem-solving.",
          "Not all who wander are lost. Some of them just failed their Perception check.",
          "The dice remember your hubris.",
          "Roll for initiative. Roll for everything. Roll to breathe if necessary.",
          "Critical failures build character. Yours and your character's.",
          "The tavern is on fire. Again.",
          "Remember: an 18 Charisma means YOU still have to do the talking.",
        ];

        var gif = Math.floor(Math.random() * 9) + 1;
        window.__SPLASH_GIF__ = gif;
        document.getElementById('splash-mascot').src = '/mascot/maid_' + gif + '.gif';

        var msgEl = document.getElementById('static-splash-msg');
        var idx = Math.floor(Math.random() * msgs.length);
        msgEl.textContent = msgs[idx];

        setInterval(function () {
          msgEl.style.animation = 'none';
          msgEl.style.opacity = '0';
          setTimeout(function () {
            idx = (idx + 1) % msgs.length;
            msgEl.textContent = msgs[idx];
            msgEl.style.animation = 'msg-fade-in 0.4s ease';
            msgEl.style.opacity = '1';
          }, 400);
        }, 3000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
